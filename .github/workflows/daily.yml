name: Daily Fursys-Insight Build

on:
  schedule:
    # 매일 KST 08:00 = UTC 23:00 (전날)
    - cron: '0 23 * * *'
  # 수동 실행 버튼 (GitHub Actions 탭에서)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit 푸시 권한
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FURSYS_INSIGHT_URL: ${{ secrets.FURSYS_INSIGHT_URL }}
          FURSYS_PUBLIC_DIR: ./public
        run: |
          mkdir -p public
          # 기존 archive 옮겨놓고 (누적 보존)
          if [ -d archive ]; then cp -r archive public/; fi
          # 새로 빌드 (RSS → 분석 → 중복제거 → top10 → HTML → Slack)
          python newsletter.py
          # 빌드 결과의 archive를 다시 루트로 동기화 (다음 회차에 누적)
          if [ -d public/archive ]; then
            rm -rf archive
            cp -r public/archive archive
          fi

      - name: Commit and push
        run: |
          git config --global user.name 'fursys-insight-bot'
          git config --global user.email 'bot@users.noreply.github.com'
          git add public/ archive/
          git diff --staged --quiet && echo "변경 없음" || (git commit -m "Daily build $(date -u +%Y-%m-%d) [skip ci]" && git push)
